<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>程序员墓志铭生成器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="bg-light">
    <main class="container py-5">
        <section class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-2">程序员墓志铭生成器</h1>
                        <p class="text-secondary mb-4">黑色幽默随机生成，点击一次就能获取一组结果。</p>

                        <div class="d-flex flex-wrap gap-2 mb-4">
                            <button id="generateButton" class="btn btn-dark" type="button">生成墓志铭</button>
                        </div>

                        <div id="resultStatus" class="alert alert-secondary" role="status">
                            等待生成。
                        </div>

                        <div id="resultContainer" class="d-none">
                            <div class="mb-3">
                                <h2 class="h5">你做过的事</h2>
                                <ul id="whatYouHaveDoneList" class="list-group"></ul>
                            </div>

                            <div class="mb-3">
                                <h2 class="h5">死亡原因</h2>
                                <ul id="deathReasonsList" class="list-group"></ul>
                            </div>

                            <div>
                                <h2 class="h5">他人评价</h2>
                                <ul id="reviewsFromOthersList" class="list-group"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const generateButton = document.getElementById("generateButton");
        const resultStatus = document.getElementById("resultStatus");
        const resultContainer = document.getElementById("resultContainer");
        const whatYouHaveDoneList = document.getElementById("whatYouHaveDoneList");
        const deathReasonsList = document.getElementById("deathReasonsList");
        const reviewsFromOthersList = document.getElementById("reviewsFromOthersList");

        function renderList(listElement, items) {
            listElement.innerHTML = "";

            if (!Array.isArray(items) || items.length === 0) {
                const emptyItemElement = document.createElement("li");
                emptyItemElement.className = "list-group-item text-secondary";
                emptyItemElement.textContent = "暂无数据";
                listElement.appendChild(emptyItemElement);
                return;
            }

            for (const item of items) {
                const itemElement = document.createElement("li");
                itemElement.className = "list-group-item";
                itemElement.textContent = String(item);
                listElement.appendChild(itemElement);
            }
        }

        async function generateEpitaphData() {
            generateButton.disabled = true;
            resultStatus.className = "alert alert-info";
            resultStatus.textContent = "生成中...";

            try {
                const response = await fetch("/generate");

                if (response.status !== 200) {
                    throw new Error(`请求失败，状态码：${response.status}`);
                }

                const payload = await response.json();

                if (!payload || payload.message !== "ok") {
                    throw new Error("接口返回异常：message 不是 ok");
                }

                const generatedData = payload.data || {};
                renderList(whatYouHaveDoneList, generatedData.what_you_have_done);
                renderList(deathReasonsList, generatedData.death_reasons);
                renderList(reviewsFromOthersList, generatedData.reviews_from_others);

                resultContainer.classList.remove("d-none");
                resultStatus.className = "alert alert-success";
                resultStatus.textContent = "生成成功。";
            } catch (error) {
                resultContainer.classList.add("d-none");
                resultStatus.className = "alert alert-danger";
                resultStatus.textContent = `生成失败：${error.message}`;
            } finally {
                generateButton.disabled = false;
            }
        }

        generateButton.addEventListener("click", generateEpitaphData);
    </script>
</body>

</html>
