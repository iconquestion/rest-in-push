<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>程序员墓志铭生成器</title>
    <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-5">
        <section class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-2">程序员墓志铭生成器</h1>
                        <p class="text-secondary mb-4">黑色幽默随机生成，点击一次就能获取一组结果。</p>

                        <div class="d-flex flex-wrap gap-2 mb-4">
                            <button id="generateButton" class="btn btn-dark" type="button">生成墓志铭</button>
                        </div>

                        <div id="resultStatus" class="alert alert-secondary" role="status">
                            等待生成。
                        </div>

                        <div id="resultContainer" class="d-none">
                            <div class="mb-3">
                                <h2 class="h5">你做过的事</h2>
                                <ul id="whatYouHaveDoneList" class="list-group"></ul>
                            </div>

                            <div class="mb-3">
                                <h2 class="h5">死亡原因</h2>
                                <ul id="deathReasonsList" class="list-group"></ul>
                            </div>

                            <div>
                                <h2 class="h5">他人评价</h2>
                                <ul id="reviewsFromOthersList" class="list-group"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/jquery/jquery.min.js"></script>
    <script>
        const $generateButton = $("#generateButton");
        const $resultStatus = $("#resultStatus");
        const $resultContainer = $("#resultContainer");
        const $whatYouHaveDoneList = $("#whatYouHaveDoneList");
        const $deathReasonsList = $("#deathReasonsList");
        const $reviewsFromOthersList = $("#reviewsFromOthersList");

        function renderList($listElement, items) {
            $listElement.empty();

            if (!Array.isArray(items) || items.length === 0) {
                $listElement.append(
                    $("<li>")
                        .addClass("list-group-item text-secondary")
                        .text("暂无数据")
                );
                return;
            }

            for (const item of items) {
                $listElement.append(
                    $("<li>")
                        .addClass("list-group-item")
                        .text(String(item))
                );
            }
        }

        async function generateEpitaphData() {
            $generateButton.prop("disabled", true);
            $resultStatus.removeClass().addClass("alert alert-info").text("生成中...");

            try {
                const response = await fetch("/generate", {
                    method: "GET"
                });

                if (response.status !== 200) {
                    throw new Error(`请求失败，状态码：${response.status}`);
                }

                const payload = await response.json();
                if (!payload || payload.message !== "ok") {
                    throw new Error("接口返回异常：message 不是 ok");
                }

                const generatedData = payload.data || {};
                renderList($whatYouHaveDoneList, generatedData.what_you_have_done);
                renderList($deathReasonsList, generatedData.death_reasons);
                renderList($reviewsFromOthersList, generatedData.reviews_from_others);

                $resultContainer.removeClass("d-none");
                $resultStatus.removeClass().addClass("alert alert-success").text("生成成功。");
            } catch (error) {
                $resultContainer.addClass("d-none");
                $resultStatus
                    .removeClass()
                    .addClass("alert alert-danger")
                    .text(`生成失败：${error.message || "未知错误"}`);
            } finally {
                $generateButton.prop("disabled", false);
            }
        }

        $generateButton.on("click", generateEpitaphData);
    </script>
</body>

</html>
